    </header>

          <div id="candidate-panel"></div>
          <div id="resources-panel"></div>
        </div>
        <div id="action-panel"></div>
      </aside>

      <main id="center-panel">
        <div id="ev-container">
          <div id="ev-bar-wrapper">
            <div id="ev-bar"></div>
            <div id="ev-win-marker">
              &nbsp;270
            </div>
          </div>
          <div id="ev-label"></div>
        </div>
        <div id="map-container">
          <div class="placeholder">
            U.S. Electoral Map Loading...
          </div>
          <div id="state-panel"></div>
        </div>
      </main>

      <aside id="sidebar-right">
        <div id="polling-panel"></div>
        <div id="battleground-panel"></div>
        <div id="news-panel"></div>
      </aside>

    </div>

    <footer id="bottom-bar">
      180 Days to Win v1.0
    </footer>

  </div>
